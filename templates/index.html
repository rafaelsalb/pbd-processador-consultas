<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processador de consultas</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f9fc;
            --card: #ffffff;
            --text: #1a1f36;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-soft: #dbeafe;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            padding: 32px;
            background: var(--bg);
            color: var(--text);
        }

        h1 {
            margin: 0 0 16px;
            font-size: 28px;
        }

        .layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            align-items: start;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(17, 24, 39, 0.05);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 14px;
            resize: vertical;
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .steps-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 13px;
        }

        .steps-table th,
        .steps-table td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .steps-table th {
            color: var(--muted);
            font-weight: 600;
        }

        .steps-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: #ecfdf3;
            color: #15803d;
        }

        .steps-empty {
            color: var(--muted);
            font-size: 13px;
            margin-top: 12px;
        }

        #graph-container {
            height: 70vh;
            min-height: 520px;
            position: relative;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--primary-soft);
            color: var(--primary);
            border-color: var(--primary-soft);
        }

        .graph-panel {
            flex: 1;
            position: relative;
            overflow: visible;
            display: none;
        }

        .graph-panel.active {
            display: block;
        }

        .graph-canvas {
            width: 100%;
            height: 420px;
            display: block;
        }

        .execution-order {
            margin-top: 16px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
        }

        .execution-order h3 {
            margin: 0 0 8px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
        }

        .execution-order table {
            width: 100%;
            border-collapse: collapse;
        }

        .execution-order th,
        .execution-order td {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .execution-order th {
            color: var(--muted);
            font-weight: 600;
        }

        .placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: 12px;
        }

        .legend {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
        }

        .legend span {
            background: var(--primary-soft);
            color: #1d4ed8;
            padding: 4px 8px;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <h1>Processador de consultas</h1>
    <div class="layout">
        <div class="card">
            <form action="/execute" method="post" id="query-form">
                <label for="query">Digite sua consulta SQL</label>
                <textarea id="query" name="query" placeholder="SELECT ..."></textarea>
                <div class="actions">
                    <button type="button" id="format-btn">Formatar</button>
                    <button type="submit" id="submit-btn">Executar</button>
                </div>
                <div class="status" id="status">Envie uma consulta para visualizar o plano.</div>
                <table class="steps-table" id="steps-table" aria-live="polite">
                    <thead>
                        <tr>
                            <th>Etapa</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="steps-body">
                        <tr>
                            <td colspan="2" class="steps-empty">Nenhuma execução ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </div>
        <div class="card" id="graph-container">
            <div class="tabs" role="tablist">
                <button class="tab-btn active" id="tab-unoptimized" type="button" role="tab" aria-controls="panel-unoptimized" aria-selected="true">Plano não otimizado</button>
                <button class="tab-btn" id="tab-optimized" type="button" role="tab" aria-controls="panel-optimized" aria-selected="false">Plano otimizado</button>
            </div>
            <div class="graph-panel active" id="panel-unoptimized" role="tabpanel" aria-labelledby="tab-unoptimized">
                <div class="placeholder" id="placeholder-unoptimized">O grafo aparecerá aqui.</div>
                <svg class="graph-canvas" id="graph-unoptimized"></svg>
                <div class="legend" id="legend-unoptimized"></div>
                <div class="execution-order">
                    <h3>Ordem de execução</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Operação</th>
                            </tr>
                        </thead>
                        <tbody id="order-unoptimized">
                            <tr>
                                <td colspan="2" class="steps-empty">Sem dados ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="graph-panel" id="panel-optimized" role="tabpanel" aria-labelledby="tab-optimized">
                <div class="placeholder" id="placeholder-optimized">O grafo aparecerá aqui.</div>
                <svg class="graph-canvas" id="graph-optimized"></svg>
                <div class="legend" id="legend-optimized"></div>
                <div class="execution-order">
                    <h3>Ordem de execução</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Operação</th>
                            </tr>
                        </thead>
                        <tbody id="order-optimized">
                            <tr>
                                <td colspan="2" class="steps-empty">Sem dados ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        const form = document.getElementById('query-form');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submit-btn');
        const formatBtn = document.getElementById('format-btn');
        const tabUnoptimized = document.getElementById('tab-unoptimized');
        const tabOptimized = document.getElementById('tab-optimized');
        const panelUnoptimized = document.getElementById('panel-unoptimized');
        const panelOptimized = document.getElementById('panel-optimized');
        const stepsBody = document.getElementById('steps-body');

        const placeholderUnoptimized = document.getElementById('placeholder-unoptimized');
        const placeholderOptimized = document.getElementById('placeholder-optimized');
        const svgUnoptimized = d3.select('#graph-unoptimized');
        const svgOptimized = d3.select('#graph-optimized');
        const legendUnoptimized = document.getElementById('legend-unoptimized');
        const legendOptimized = document.getElementById('legend-optimized');
        const orderUnoptimized = document.getElementById('order-unoptimized');
        const orderOptimized = document.getElementById('order-optimized');

        const nodeColors = {
            Projection: '#dbeafe',
            Selection: '#ede9fe',
            Join: '#fee2e2',
            TableScan: '#dcfce7'
        };

        const nodeBorders = {
            Projection: '#1d4ed8',
            Selection: '#6d28d9',
            Join: '#b91c1c',
            TableScan: '#15803d'
        };

        const sqlKeywords = new Set([
            'select', 'from', 'where', 'join', 'on', 'and',
        ]);

        let catalogCache = null;

        async function loadCatalog() {
            if (catalogCache) return catalogCache;
            const response = await fetch('/catalog');
            if (!response.ok) {
                throw new Error('Falha ao carregar o catálogo.');
            }
            const schema = await response.json();
            const tableMap = new Map();
            const columnMap = new Map();
            const qualifiedMap = new Map();

            for (const [table, columns] of Object.entries(schema)) {
                tableMap.set(table.toLowerCase(), table);
                for (const qualified of columns) {
                    const parts = qualified.split('.');
                    if (parts.length === 2) {
                        const [tableName, columnName] = parts;
                        columnMap.set(columnName.toLowerCase(), columnName);
                        qualifiedMap.set(`${tableName.toLowerCase()}.${columnName.toLowerCase()}`, qualified);
                    }
                }
            }

            catalogCache = { tableMap, columnMap, qualifiedMap };
            return catalogCache;
        }

        function titleCaseIdentifier(word) {
            return word
                .split('_')
                .map(part => part ? part[0].toUpperCase() + part.slice(1).toLowerCase() : part)
                .join('_');
        }

        function resolveIdentifier(word, catalog) {
            if (!catalog) return titleCaseIdentifier(word);
            const lower = word.toLowerCase();
            if (catalog.tableMap.has(lower)) {
                return catalog.tableMap.get(lower);
            }
            if (catalog.columnMap.has(lower)) {
                return catalog.columnMap.get(lower);
            }
            return titleCaseIdentifier(word);
        }

        function formatQuery(query, catalog) {
            if (!query) return '';
            const tokens = query.match(/\s+|"[^"]*"|'[^']*'|`[^`]*`|\b\w+\b|\S/g) || [];
            return tokens.map((token) => {
                if (/^\s+$/.test(token)) {
                    return token;
                }
                if (/^"[^"]*"$|^'[^']*'$|^`[^`]*`$/.test(token)) {
                    return token;
                }
                if (/^\w+$/.test(token)) {
                    const lower = token.toLowerCase();
                    if (sqlKeywords.has(lower)) {
                        return lower.toUpperCase();
                    }
                    if (/^\d+$/.test(token)) {
                        return token;
                    }
                    return resolveIdentifier(token, catalog);
                }
                return token;
            }).join('');
        }

        function buildTree(plan) {
            if (!plan) return null;
            const node = { ...plan };
            const children = [];
            if (node.child) {
                children.push(buildTree(node.child));
            }
            if (node.left_node) {
                children.push(buildTree(node.left_node));
            }
            if (node.right_node) {
                children.push(buildTree(node.right_node));
            }
            node.children = children.filter(Boolean);
            return node;
        }

        const measureContext = document.createElement('canvas').getContext('2d');
        const titleFont = '700 14px Inter, system-ui, -apple-system, sans-serif';
        const bodyFont = '400 12px Inter, system-ui, -apple-system, sans-serif';

        function formatLabelLines(node) {
            if (node.type === 'Projection') {
                const cols = Array.isArray(node.columns) ? node.columns : [String(node.columns)];
                const bulletLines = cols.map(col => `• ${col}`);
                return { title: 'Projection', lines: bulletLines };
            }
            if (node.type === 'Selection') {
                return { title: 'Seleção', lines: [`Condição: ${conditionToText(node.condition)}`] };
            }
            if (node.type === 'Join') {
                return { title: 'Junção', lines: [`Condição: ${conditionToText(node.condition)}`] };
            }
            return { title: 'TableScan', lines: [`table=${node.table_name}`] };
        }

        function conditionToText(condition) {
            if (!condition) return '';
            if (typeof condition === 'string') return condition;
            if (condition.type === 'Identifier') return condition.name;
            if (condition.type === 'Final') return String(condition.value);
            if (condition.type === 'LogicalOperator') {
                const left = conditionToText(condition.left);
                const right = conditionToText(condition.right);
                return `${left} ${condition.operator} ${right}`.trim();
            }
            return String(condition.value ?? condition);
        }

        function textWidth(text, font) {
            measureContext.font = font;
            return measureContext.measureText(text).width;
        }

        function wrapLine(text, font, maxWidth) {
            if (!text) return [''];
            const words = text.split(/\s+/);
            const lines = [];
            let line = '';

            for (const word of words) {
                const test = line ? `${line} ${word}` : word;
                if (textWidth(test, font) <= maxWidth) {
                    line = test;
                    continue;
                }

                if (line) {
                    lines.push(line);
                }

                if (textWidth(word, font) <= maxWidth) {
                    line = word;
                } else {
                    let chunk = '';
                    for (const char of word) {
                        const next = chunk + char;
                        if (textWidth(next, font) <= maxWidth) {
                            chunk = next;
                        } else {
                            if (chunk) lines.push(chunk);
                            chunk = char;
                        }
                    }
                    line = chunk;
                }
            }

            if (line) lines.push(line);
            return lines;
        }

        function renderLegend(target) {
            target.innerHTML = '';
            Object.keys(nodeColors).forEach((type) => {
                const chip = document.createElement('span');
                chip.textContent = type;
                chip.style.background = nodeColors[type];
                chip.style.color = nodeBorders[type];
                target.appendChild(chip);
            });
        }

        const graphState = {
            unoptimized: null,
            optimized: null,
            active: 'unoptimized'
        };

        function nodeSummary(node) {
            if (!node) return 'Fim';
            if (node.type === 'Projection') {
                const cols = Array.isArray(node.columns) ? node.columns.join(', ') : node.columns;
                return `Projection(${cols})`;
            }
            if (node.type === 'Selection') {
                return `Selection(${conditionToText(node.condition)})`;
            }
            if (node.type === 'Join') {
                return `Join(${conditionToText(node.condition)})`;
            }
            if (node.type === 'TableScan') {
                return `TableScan(${node.table_name})`;
            }
            return node.type || 'Operação';
        }

        function renderExecutionOrder(sequence, target) {
            target.innerHTML = '';
            if (!sequence || sequence.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="2" class="steps-empty">Sem dados ainda.</td>';
                target.appendChild(row);
                return;
            }

            sequence.forEach((step, index) => {
                const row = document.createElement('tr');
                const indexCell = document.createElement('td');
                indexCell.textContent = String(index + 1);
                const currentCell = document.createElement('td');
                currentCell.textContent = nodeSummary(step.current);
                row.appendChild(indexCell);
                row.appendChild(currentCell);
                target.appendChild(row);
            });
        }

        function renderSteps(steps) {
            stepsBody.innerHTML = '';
            if (!steps || steps.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="2" class="steps-empty">Nenhuma execução ainda.</td>';
                stepsBody.appendChild(row);
                return;
            }

            steps.forEach((step, index) => {
                const row = document.createElement('tr');
                const stepCell = document.createElement('td');
                stepCell.textContent = `${index + 1}. ${step}`;
                const statusCell = document.createElement('td');
                statusCell.innerHTML = '<span class="steps-badge">Concluído</span>';
                row.appendChild(stepCell);
                row.appendChild(statusCell);
                stepsBody.appendChild(row);
            });
        }

        function renderGraph(plan, config) {
            const treeData = buildTree(plan);
            if (!treeData) {
                config.placeholder.style.display = 'flex';
                config.svg.selectAll('*').remove();
                config.legend.innerHTML = '';
                return;
            }

            config.placeholder.style.display = 'none';
            config.svg.selectAll('*').remove();
            renderLegend(config.legend);

            const container = config.container;
            const width = container.clientWidth - 40;
            const height = container.clientHeight - 40;
            config.svg.attr('width', width).attr('height', height);

            const root = d3.hierarchy(treeData);
            const treeLayout = d3.tree()
                .nodeSize([220, 200])
                .separation((a, b) => (a.parent === b.parent ? 1.4 : 1.8));
            treeLayout(root);

            const g = config.svg
                .append('g')
                .attr('transform', `translate(${width / 2}, 40)`);

            const zoom = d3.zoom().scaleExtent([0.5, 2]).on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
            config.svg.call(zoom);

            g.selectAll('path.link')
                .data(root.links())
                .join('path')
                .attr('class', 'link')
                .attr('fill', 'none')
                .attr('stroke', '#94a3b8')
                .attr('stroke-width', 2)
                .attr('d', d3.linkVertical()
                    .x(d => d.x)
                    .y(d => d.y)
                );

            const node = g.selectAll('g.node')
                .data(root.descendants())
                .join('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x}, ${d.y})`);

            node.append('rect')
                .attr('rx', 12)
                .attr('fill', d => nodeColors[d.data.type] || '#e2e8f0')
                .attr('stroke', d => nodeBorders[d.data.type] || '#64748b')
                .attr('stroke-width', 2)
                .attr('filter', 'drop-shadow(0 6px 12px rgba(15, 23, 42, 0.08))');

            const textGroup = node.append('text')
                .attr('x', 0)
                .attr('text-anchor', 'start')
                .attr('fill', '#0f172a');

            node.each(function (d) {
                const group = d3.select(this);
                const textEl = group.select('text');
                const rect = group.select('rect');

                const { title, lines: detailSource } = formatLabelLines(d.data);
                const maxTextWidth = 220;
                const wrappedDetails = detailSource.flatMap(line => wrapLine(line, bodyFont, maxTextWidth));
                const lines = [
                    { text: title, font: titleFont, size: 14, weight: 700 },
                    ...wrappedDetails.map(line => ({ text: line, font: bodyFont, size: 12, weight: 400 }))
                ];

                textEl.selectAll('tspan').remove();

                const lineHeights = lines.map(line => line.size * 1.35);
                const totalHeight = lineHeights.reduce((sum, h) => sum + h, 0);
                const startY = -totalHeight / 2 + lineHeights[0] / 2;

                let currentY = startY;
                let maxWidth = 0;

                const textX = 0;
                lines.forEach((line, index) => {
                    const tspan = textEl.append('tspan')
                        .attr('x', textX)
                        .attr('y', currentY)
                        .attr('font-size', line.size)
                        .attr('font-weight', line.weight)
                        .text(line.text);
                    const width = textWidth(line.text, line.font);
                    maxWidth = Math.max(maxWidth, width);
                    currentY += lineHeights[index];
                });

                const paddingX = 24;
                const paddingY = 18;
                const rectWidth = Math.max(220, maxWidth + paddingX * 2);
                const rectHeight = Math.max(80, totalHeight + paddingY * 2);

                rect
                    .attr('x', -rectWidth / 2)
                    .attr('y', -rectHeight / 2)
                    .attr('width', rectWidth)
                    .attr('height', rectHeight);
                const leftX = -rectWidth / 2 + paddingX;
                textEl.attr('x', leftX);
                textEl.selectAll('tspan').attr('x', leftX);
            });
        }

        function setActiveTab(tab) {
            graphState.active = tab;
            const isUnoptimized = tab === 'unoptimized';

            tabUnoptimized.classList.toggle('active', isUnoptimized);
            tabOptimized.classList.toggle('active', !isUnoptimized);
            tabUnoptimized.setAttribute('aria-selected', String(isUnoptimized));
            tabOptimized.setAttribute('aria-selected', String(!isUnoptimized));
            panelUnoptimized.classList.toggle('active', isUnoptimized);
            panelOptimized.classList.toggle('active', !isUnoptimized);

            if (isUnoptimized && graphState.unoptimized) {
                renderGraph(graphState.unoptimized, {
                    container: panelUnoptimized,
                    placeholder: placeholderUnoptimized,
                    svg: svgUnoptimized,
                    legend: legendUnoptimized
                });
            }

            if (!isUnoptimized && graphState.optimized) {
                renderGraph(graphState.optimized, {
                    container: panelOptimized,
                    placeholder: placeholderOptimized,
                    svg: svgOptimized,
                    legend: legendOptimized
                });
            }
        }

        tabUnoptimized.addEventListener('click', () => setActiveTab('unoptimized'));
        tabOptimized.addEventListener('click', () => setActiveTab('optimized'));

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const query = document.getElementById('query').value;
            status.textContent = 'Executando consulta...';
            submitBtn.disabled = true;
            fetch('/execute', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query })
            })
            .then(response => response.json())
            .then(data => {
                submitBtn.disabled = false;
                if (data.error) {
                    status.textContent = `Erro: ${data.error}`;
                    renderSteps(data.steps);
                    graphState.unoptimized = null;
                    graphState.optimized = null;
                    renderExecutionOrder([], orderUnoptimized);
                    renderExecutionOrder([], orderOptimized);
                    renderGraph(null, {
                        container: panelUnoptimized,
                        placeholder: placeholderUnoptimized,
                        svg: svgUnoptimized,
                        legend: legendUnoptimized
                    });
                    renderGraph(null, {
                        container: panelOptimized,
                        placeholder: placeholderOptimized,
                        svg: svgOptimized,
                        legend: legendOptimized
                    });
                    return;
                }
                status.textContent = 'Plano de execução renderizado.';
                renderSteps(data.steps);
                graphState.unoptimized = data.unoptimized_plan || null;
                graphState.optimized = data.execution_plan || null;
                renderExecutionOrder(data.unoptimized_sequence || [], orderUnoptimized);
                renderExecutionOrder(data.optimized_sequence || [], orderOptimized);
                renderGraph(graphState.unoptimized, {
                    container: panelUnoptimized,
                    placeholder: placeholderUnoptimized,
                    svg: svgUnoptimized,
                    legend: legendUnoptimized
                });
                renderGraph(graphState.optimized, {
                    container: panelOptimized,
                    placeholder: placeholderOptimized,
                    svg: svgOptimized,
                    legend: legendOptimized
                });
                setActiveTab('unoptimized');
            })
            .catch(error => {
                console.error('Error:', error);
                status.textContent = 'Erro ao executar a consulta.';
                submitBtn.disabled = false;
            });
        });

        formatBtn.addEventListener('click', async function() {
            const queryEl = document.getElementById('query');
            try {
                status.textContent = 'Formatando consulta...';
                const catalog = await loadCatalog();
                queryEl.value = formatQuery(queryEl.value, catalog);
                status.textContent = 'Consulta formatada.';
            } catch (error) {
                console.error('Error:', error);
                status.textContent = 'Não foi possível formatar a consulta.';
            }
        });

        window.addEventListener('resize', () => {
            if (graphState.active === 'unoptimized' && graphState.unoptimized) {
                renderGraph(graphState.unoptimized, {
                    container: panelUnoptimized,
                    placeholder: placeholderUnoptimized,
                    svg: svgUnoptimized,
                    legend: legendUnoptimized
                });
            }
            if (graphState.active === 'optimized' && graphState.optimized) {
                renderGraph(graphState.optimized, {
                    container: panelOptimized,
                    placeholder: placeholderOptimized,
                    svg: svgOptimized,
                    legend: legendOptimized
                });
            }
        });
    </script>
</body>
</html>
